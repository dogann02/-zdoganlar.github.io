<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Özdoğanlar Otomotiv</title>
<style>
  body {
    background-color: #0a0a0a;
    color: #f2f2f2;
    font-family: sans-serif;
    margin: 0;
    padding: 20px;
    text-align: center;
  }
  header {
    background: #141414;
    padding: 15px;
    border-radius: 8px;
    margin-bottom: 20px;
  }
  h1 { color: #e50914; }
  .nav-btn {
    background: #242424;
    color: white;
    border: none;
    padding: 10px 20px;
    margin: 5px;
    border-radius: 5px;
    cursor: pointer;
  }
  .nav-btn.active { background: #e50914; }
  .page { display: none; padding: 20px; background: #141414; border-radius: 8px; }
  .page.active { display: block; }
</style>
</head>
<body>

<header>
  <h1>ÖZDOĞANLAR OTOMOTİV</h1>
  <button class="nav-btn active" onclick="showPage('home')">Ana Sayfa</button>
  <button class="nav-btn" onclick="showPage('vehicles')">Araçlar</button>
  <button class="nav-btn" onclick="showPage('parts')">Parçalar</button>
</header>

<div id="home" class="page active">
  <h2>Hoş Geldiniz</h2>
  <p>İkinci el araç ve yedek parçada güvenilir adres.</p>
</div>

<div id="vehicles" class="page">
  <h2>Satılık Araçlar</h2>
  <p>Kontrolden geçmiş araçlarımız çok yakında burada listelenecektir.</p>
</div>

<div id="parts" class="page">
  <h2>Yedek Parçalar</h2>
  <p>Orijinal ve muadil yedek parça seçenekleri.</p>
</div>

<script>
  function showPage(pageId) {
    // Sayfaları değiştir
    var pages = document.querySelectorAll('.page');
    pages.forEach(function(p) { p.classList.remove('active'); });
    document.getElementById(pageId).classList.add('active');

    // Butonları güncelle
    var buttons = document.querySelectorAll('.nav-btn');
    buttons.forEach(function(b) { b.classList.remove('active'); });
    event.currentTarget.classList.add('active');
  }
</script>

</body>
</html>
