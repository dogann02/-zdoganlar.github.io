<script>
  // Sayfa Değiştirme Fonksiyonu (Katalog Geçişleri)
  function showPage(pageId) {
    // Tüm sayfaları gizle
    const pages = document.querySelectorAll('.page');
    pages.forEach(page => {
      page.classList.remove('active');
    });

    // İstenen sayfayı aktif et
    const targetPage = document.getElementById('page-' + pageId);
    if(targetPage) {
      targetPage.classList.add('active');
    }

    // Navigasyon butonlarının aktifliğini güncelle
    const navButtons = document.querySelectorAll('.nav-btn');
    navButtons.forEach(btn => {
      if(btn.getAttribute('data-page') === pageId) {
        btn.classList.add('active');
      } else {
        btn.classList.remove('active');
      }
    });

    // Sayfayı en yukarı kaydır
    window.scrollTo({top: 0, behavior: 'smooth'});
  }

  // Modalları Açma Fonksiyonu
  function openModal(modalId) {
    const modal = document.getElementById(modalId);
    if(modal) {
      modal.classList.add('active');
    }
  }

  // Modalları Kapatma Fonksiyonu
  function closeModal(modalId) {
    const modal = document.getElementById(modalId);
    if(modal) {
      modal.classList.remove('active');
    }
  }

  // Modal Dışına Tıklanınca Kapanma Ayarı
  function closeModalOnOverlay(event, modalId) {
    if(event.target.id === modalId) {
      closeModal(modalId);
    }
  }

  // Tamir bakım içinden özel iletişim modalını açmak için kısayol
  function openContactModal() {
    closeModal('maintenanceModal');
    openModal('contactModal');
  }

  // Giriş / Kayıt Ol sekmeleri arası geçiş fonksiyonu
  function switchTab(button, tabId) {
    // Aktif tab butonunu değiştir
    const tabs = button.parentElement.querySelectorAll('.tab-btn');
    tabs.forEach(t => t.classList.remove('active'));
    button.classList.add('active');

    // Panelleri değiştir
    const panels = button.parentElement.parentElement.querySelectorAll('.tab-panel');
    panels.forEach(p => p.classList.remove('active'));
    
    const targetPanel = document.getElementById(tabId);
    if(targetPanel) {
      targetPanel.classList.add('active');
    }
  }
</script>
